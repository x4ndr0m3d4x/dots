context.modules = [
    # --- 1. GENERAL ---
    { name = libpipewire-module-loopback
        args = {
            node.description = "Wave Link General"
            capture.props = {
                node.name      = "wavelink-general"
                media.class    = "Audio/Sink"
                audio.position = [ FL FR ]
            }
            playback.props = {
                # `pw-link -io` and copy your headphones (everything up until the ':' character)
                target.object = "alsa_output.usb-Elgato_Systems_Elgato_Wave_3_BS25K1A03325-00.analog-stereo"
                node.passive  = true
            }
        }
    }
    # --- 2. BROWSER ---
    { name = libpipewire-module-loopback
        args = {
            node.description = "Wave Link Browser"
            capture.props = {
                node.name      = "wavelink-browser"
                media.class    = "Audio/Sink"
                audio.position = [ FL FR ]
            }
            playback.props = {
                target.object = "alsa_output.usb-Elgato_Systems_Elgato_Wave_3_BS25K1A03325-00.analog-stereo"
                node.passive  = true
            }
        }
    }
    # --- 3. MUSIC ---
    { name = libpipewire-module-loopback
        args = {
            node.description = "Wave Link Music"
            capture.props = {
                node.name      = "wavelink-music"
                media.class    = "Audio/Sink"
                audio.position = [ FL FR ]
            }
            playback.props = {
                target.object = "alsa_output.usb-Elgato_Systems_Elgato_Wave_3_BS25K1A03325-00.analog-stereo"
                node.passive  = true
            }
        }
    }
    # --- 4. GAMES ---
    { name = libpipewire-module-loopback
        args = {
            node.description = "Wave Link Games"
            capture.props = {
                node.name      = "wavelink-games"
                media.class    = "Audio/Sink"
                audio.position = [ FL FR ]
            }
            playback.props = {
                target.object = "alsa_output.usb-Elgato_Systems_Elgato_Wave_3_BS25K1A03325-00.analog-stereo"
                node.passive  = true
            }
        }
    }
    # --- 5. VOICE CHAT ---
    { name = libpipewire-module-loopback
        args = {
            node.description = "Wave Link Voice Chat"
            capture.props = {
                node.name      = "wavelink-voice-chat"
                media.class    = "Audio/Sink"
                audio.position = [ FL FR ]
            }
            playback.props = {
                target.object = "alsa_output.usb-Elgato_Systems_Elgato_Wave_3_BS25K1A03325-00.analog-stereo"
                node.passive = true
            }
        }
    }
    # --- 6. MIC FX ---
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "Wave 3 (Studio Processed)"
            media.name       = "Wave 3 (Studio Processed)"
            filter.graph = {
                nodes = [
                    # 1. Noise Suppression
                    {
                        type   = ladspa
                        name   = rnnoise
                        plugin = /usr/lib/ladspa/librnnoise_ladspa.so
                        label  = noise_suppressor_mono
                        control = {
                            "VAD Threshold (%)" = 10.0
                        }
                    }
                    # 2. DJ EQ
                    {
                        type   = ladspa
                        name   = dj_eq
                        plugin = /usr/lib/ladspa/dj_eq_1901.so
			            label  = dj_eq_mono                    
            			control = {
                            "Lo gain (dB)"  = -15.0
                            "Mid gain (dB)" = 0.0
                            "Hi gain (dB)"  = 4.0
                        }
                    }
			        # 3. Compressor
			        {
			            type   = ladspa
			            name   = compressor
			            plugin = /usr/lib/ladspa/sc4m_1916.so
			            label  = sc4m
			            control = {
			                "RMS/peak" = 0.0
			                "Attack time (ms)" = 3.0
			                "Release time (ms)" = 100.0
			                "Threshold level (dB)" = -10.0
			                "Ratio (1:n)" = 3.0
			                "Knee radius (dB)" = 3.0
			                "Makeup gain (dB)" = 0.0
			            }
			        }
                ]
                # sudo pacman -S ladspa
                # analyseplugin /usr/lib/ladspa/xxx.so to get the input and output names
                links = [
        		    { output = "rnnoise:Output"    input = "dj_eq:Input"   }
	        	    { output = "dj_eq:Output"      input = "compressor:Input" }
    	    	]
    	    }
            capture.props = {
                node.passive  = true
                # `pw-link -io` and copy your mic (everything up until the ':' character)
                target.object = "alsa_input.usb-Elgato_Systems_Elgato_Wave_3_BS25K1A03325-00.mono-fallback"
            }
            playback.props = {
                node.name   = "studio_vocal_mic"
                media.class = "Audio/Source"
            }
        }
    }
]
